version: '3.8'
services:
  database:
    image: postgres:15-alpine
    container_name: neovolt_postgres
    # env_file:
    #   - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./scripts_sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: neovolt_pgadmin
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - database
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
  
  python:
    image: python:3.12-slim
    container_name: neovolt_etl
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=database
    volumes:
      - .:/app
    working_dir: /app
    command: bash -c "pip install -r requirements.txt && python pipeline/etl_pipeline.py"
    depends_on:
      - database

volumes:
  postgres_data:
  pgadmin_data:

# Volumes: `postgres_data` est un volume nommé pour persister /var/lib/postgresql/data.
# Healthcheck: `pg_isready` vérifie la disponibilité PostgreSQL (interval 10s, timeout 5s, retries 5).
